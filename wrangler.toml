name = "reearth-papers"
main = "src/index.ts"
compatibility_date = "2026-01-09"

# Pin the deploying account so CI doesn't accidentally publish to whatever
# account the API token happens to be primarily scoped to.
account_id = "6bec0134af3a47eff814c2581f42993f"

[observability]
enabled = true

# WebP encoder for the ESA WorldCover tile pipeline (@jsquash/webp).
# Importing the `.wasm` resolves to a `WebAssembly.Module` instead of
# triggering a runtime fetch, which is the only path that works inside
# Workers (no filesystem, no `WebAssembly.instantiateStreaming` on a
# bundler-relative URL). See `src/esa_worldcover.ts`.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# Keep the workers.dev subdomain alive alongside the custom domain.
# We need it because maplibre-native's libcurl (OpenSSL) was failing
# TLS to `papers.reearth.land:443` from inside the container with
# SSL_ERROR_SYSCALL — reqwest (rustls) on the same URL works fine.
# Routing the container's vector-tile fetches via the workers.dev
# hostname dodges whatever cert/ALPN combination is upsetting it.
workers_dev = true

# Custom domain. `custom_domain = true` makes Cloudflare provision the
# DNS record + TLS cert and route all traffic for the hostname to this
# Worker (no path matching, no zone_name needed when the zone is on the
# same account).
[[routes]]
pattern = "papers.reearth.land"
custom_domain = true

# Static assets (preview page, etc.) served from ./public. Assets are
# matched before the worker handler runs, so `/` and `/preview.html`
# fall through to public/index.html automatically without any code in
# src/index.ts.
[assets]
directory = "./public"

# Container bound as `TileRenderer`. Renders MapLibre styles to PNG
# tiles via maplibre-native + lavapipe (software Vulkan). See
# `container/Dockerfile`.
[[containers]]
class_name = "TileRenderer"
image = "./container/Dockerfile"
# Up to 4 instances so the SHARD_COUNT shards in src/index.ts can run
# in parallel under load.
max_instances = 4
# 2 vCPU: software-Vulkan (lavapipe) rasterization is CPU bound, and
# doubling the cores roughly halves single-tile render time. CF's
# custom-shape ratios require ≥3 GiB RAM per vCPU and disk ≤ 2× RAM.
instance_type = { vcpu = 2, memory_mib = 6144, disk_mb = 12000 }

[[durable_objects.bindings]]
name = "TILE_CONTAINER"
class_name = "TileRenderer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TileRenderer"]

# Shared with the mirror worker — `reearth-papers-mirror` writes
# `mirror/protomaps/{date}.pmtiles` and `mirror/protomaps/latest.json`
# into this bucket, and the tile worker range-reads them here.
[[r2_buckets]]
binding = "R2"
bucket_name = "reearth-papers"
# Use the real (remote) bucket even when running `wrangler dev`. The
# tile pipeline reads ~hundreds of MB of mirrored data so local R2
# emulation isn't practical to seed.
remote = true

[vars]
# Default style to render when the client doesn't pass ?style=
# Must NOT be `papers.reearth.land` (this worker's custom domain) —
# Workers Containers drop self-loop egress, so the renderer container
# can't fetch the style from its own worker. Point at the mirror's
# workers.dev hostname; the style payload it serves embeds vector tile
# URLs on the same origin, so the whole render chain stays off the
# self-loop path.
DEFAULT_STYLE_URL = "https://reearth-papers-mirror.reearth.workers.dev/style.json"
# R2 prefix the Protomaps mirror writes under. Must match
# `mirror/protomaps/wrangler.toml`'s MIRROR_PREFIX.
MIRROR_PREFIX = "mirror/protomaps"
