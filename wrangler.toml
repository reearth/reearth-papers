name = "reearth-papers"
main = "src/index.ts"
compatibility_date = "2026-01-09"

# Pin the deploying account so CI doesn't accidentally publish to whatever
# account the API token happens to be primarily scoped to.
account_id = "6bec0134af3a47eff814c2581f42993f"

[observability]
enabled = true

# Custom domain. `custom_domain = true` makes Cloudflare provision the
# DNS record + TLS cert and route all traffic for the hostname to this
# Worker (no path matching, no zone_name needed when the zone is on the
# same account).
[[routes]]
pattern = "papers.reearth.land"
custom_domain = true

# -----------------------------------------------------------------------------
# Container: MapLibre raster renderer
# -----------------------------------------------------------------------------
# `instance_type` controls vCPU / RAM / disk. Predefined sizes exist
# ("dev", "basic", "standard-1" … "standard-4"); we use a custom shape
# tuned for MapLibre rendering. Cloudflare enforces two ratios on custom
# shapes, so the numbers below are the *minimum* compliant set for 1 vCPU:
#
#   - 1 vCPU       — software-GL rasterization is CPU bound; <1 vCPU made
#                    single-tile render visibly slow in local testing.
#   - 3072 MiB RAM — Cloudflare requires ≥3 GiB per vCPU (up to the first
#                    4). 1 GiB would be plenty for maplibre-native itself
#                    but the platform won't accept it at vcpu=1.
#   - 4000 MB disk — Cloudflare caps disk at 2× memory (GB ≤ 2 × GiB), so
#                    with 3 GiB RAM the ceiling is 6000 MB. Our image is
#                    ~350 MiB; 4000 MB leaves comfortable headroom for the
#                    temp style cache.
#
# `max_instances` caps the autoscale fanout. Workers Containers wakes a new
# instance per shard when load grows; for a tile renderer 5 is a soft start.
[[containers]]
class_name = "TileRenderer"
image = "./container/Dockerfile"
max_instances = 5
# Was a custom 1 vCPU / 3 GiB / 4 GB disk shape; new container apps
# refused to provision any instances under that config (CF-side issue
# we couldn't pin down). `standard-1` is the predefined equivalent and
# does come up.
instance_type = "standard-1"

# Containers are addressed through a Durable Object binding.
[[durable_objects.bindings]]
name = "TILE_CONTAINER"
class_name = "TileRenderer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TileRenderer"]

# Shared with the mirror worker — `reearth-papers-mirror` writes
# `mirror/protomaps/{date}.pmtiles` and `mirror/protomaps/latest.json`
# into this bucket, and the tile worker range-reads them here.
[[r2_buckets]]
binding = "R2"
bucket_name = "reearth-papers"

[vars]
# Default style to render when the client doesn't pass ?style=
DEFAULT_STYLE_URL = "https://papers.reearth.land/style.json"
# R2 prefix the Protomaps mirror writes under. Must match
# `mirror/protomaps/wrangler.toml`'s MIRROR_PREFIX.
MIRROR_PREFIX = "mirror/protomaps"
