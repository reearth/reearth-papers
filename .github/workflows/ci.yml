name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs for the same branch/PR — successive pushes
# supersede earlier ones.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    name: Worker (typecheck + wrangler dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # wrangler 4.x requires Node 22+
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      # `wrangler deploy --dry-run` validates the config (bindings, DO
      # migrations, container image path) and bundles the worker —
      # catches issues the typecheck won't. We pass a dummy token so the
      # CLI doesn't fail authentication during PR builds.
      - name: Wrangler dry-run
        run: npm run deploy:dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || 'dry-run-noop' }}
          # Skip the container image build during dry-run. We only want
          # wrangler to validate config + bundle the worker; the image
          # itself is exercised by the dedicated `container` job below.
          # `/bin/true` makes every wrangler→docker invocation a no-op.
          WRANGLER_DOCKER_BIN: /bin/true

  mirror:
    name: Mirror worker (typecheck + wrangler dry-run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mirror/protomaps
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mirror/protomaps/package-lock.json

      - run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Wrangler dry-run
        run: npm run deploy:dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || 'dry-run-noop' }}

  container:
    name: Container (docker build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Docker buildx is used so the Dockerfile's BuildKit syntax
      # (`# syntax=docker/dockerfile:1.7`) is respected. We don't push
      # the image here — this job exists only to fail the build if the
      # Dockerfile drifts or a system package disappears upstream.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (sanity)
        uses: docker/build-push-action@v6
        with:
          context: container
          file: container/Dockerfile
          push: false
          # GHA cache so consecutive CI runs reuse the apt + cargo
          # builder layers (the slow ones).
          cache-from: type=gha,scope=container
          cache-to: type=gha,scope=container,mode=max
