name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs for the same branch/PR — successive pushes
# supersede earlier ones.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    name: Worker (typecheck + wrangler dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # wrangler 4.x requires Node 22+
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      # `wrangler deploy --dry-run` validates the config (bindings, DO
      # migrations, container image path) and bundles the worker —
      # catches issues the typecheck won't. We pass a dummy token so the
      # CLI doesn't fail authentication during PR builds.
      - name: Wrangler dry-run
        run: npm run deploy:dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || 'dry-run-noop' }}

  container:
    name: Container (cargo check + docker build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: container
    steps:
      - uses: actions/checkout@v4

      # Pin Rust to the toolchain the container's Dockerfile installs
      # (rustup default in the Dockerfile is 1.92.0). Keeping the host
      # cargo check on the same channel avoids "compiles in CI, fails in
      # container" surprises.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: container -> target
          shared-key: container

      # `cargo check` is a fast (~2 min) signal that the Rust code still
      # builds against the locked deps. The full `cargo build --release`
      # is reserved for the actual container build below.
      - name: cargo check
        run: cargo check --release

      # Docker buildx is used so the Dockerfile's BuildKit syntax
      # (`# syntax=docker/dockerfile:1.7`) is respected. We don't push
      # the image here — this job exists only to fail the build if the
      # Dockerfile drifts or a system package disappears upstream.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (sanity)
        uses: docker/build-push-action@v6
        with:
          context: container
          file: container/Dockerfile
          push: false
          # GHA cache so consecutive CI runs reuse the apt + cargo
          # builder layers (the slow ones).
          cache-from: type=gha,scope=container
          cache-to: type=gha,scope=container,mode=max
