name = "reearth-papers-mirror"
main = "src/index.ts"
compatibility_date = "2026-01-09"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Monthly mirror: the 1st of each month at 07:00 UTC. Offset from
# reearth-terrain's 03:00 / 05:00 UTC runs so the two accounts don't
# hit build.protomaps.com from the same Cloudflare egress at once.
[triggers]
crons = ["0 7 1 * *"]

# Dedicated R2 bucket for papers — kept separate from reearth-terrain
# so credentials / lifecycle policies / billing stay isolated.
[[r2_buckets]]
binding = "R2"
bucket_name = "reearth-papers"

# Workflow that streams the upstream PMTiles archive into R2 over many
# multipart-upload parts. `step.do` boundaries keep each invocation well
# under the Worker CPU and subrequest limits, and persist part etags so
# a transient failure resumes from the last completed part.
[[workflows]]
name = "pmtiles-mirror"
binding = "PMTILES_MIRROR"
class_name = "PmtilesMirrorWorkflow"

[vars]
ENVIRONMENT = "production"
# Upstream Protomaps daily build base URL.
UPSTREAM_BASE = "https://build.protomaps.com"
# R2 key prefix for mirrored archives. `latest.json` lives directly
# under this prefix.
MIRROR_PREFIX = "mirror/protomaps"
# Bytes per multipart part. 50 MiB keeps a single part within Worker
# memory limits and stays under the 10,000-parts ceiling for any
# realistic PMTiles archive size.
PART_SIZE = "52428800"
# How many previous mirrored archives to keep around. The Workflow
# deletes anything older than this after a successful upload.
RETAIN_VERSIONS = "2"

# Secrets (set via `wrangler secret put`, NOT in [vars]):
#   MIRROR_TOKEN    — Bearer token guarding `POST /runs` + `GET /runs/{id}`
#                     (operator-facing).
#   INTERNAL_TOKEN  — Shared secret guarding `/style.json` and
#                     `/protomaps/{z}/{x}/{y}.mvt`. Must match the
#                     same-named secret on the main `reearth-papers`
#                     worker, which appends it as `?token=` to the
#                     style URL passed to the renderer container.
